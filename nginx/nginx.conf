worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'ssl_client_s_dn="$ssl_client_s_dn" '
                    'ssl_client_verify="$ssl_client_verify"';

    access_log /var/log/nginx/access.log main;

    # DNS resolver for upstream connections
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # Proxy timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    # Buffer sizes
    proxy_buffer_size     128k;
    proxy_buffers         4 256k;
    proxy_busy_buffers_size 256k;

    # Max request body
    client_max_body_size 50m;

    # Health check server (no SSL, internal only)
    server {
        listen 8080;
        server_name localhost;

        location /health {
            return 200 '{"status":"ok","proxy":"ollama-proxy","mtls":"enabled"}';
            add_header Content-Type application/json;
        }
    }

    # mTLS server (SSL with client certificate verification)
    server {
        listen 443 ssl;
        server_name ollama-proxy localhost;

        # Server SSL certificate
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Client certificate verification (mTLS)
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client on;
        ssl_verify_depth 1;

        # TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # /generate → ollama's /api/generate
        location /generate {
            proxy_pass http://host.docker.internal:11434/api/generate;

            # Pass standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass client certificate info to upstream
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;

            # Support streaming responses (SSE for chat completions)
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
            proxy_buffering off;
        }

        # /openrouter → openrouter.ai API (with mTLS and API key injection)
        location /openrouter {
            proxy_pass https://openrouter.ai/api/v1/chat/completions;

            # Set Host header for upstream
            proxy_set_header Host openrouter.ai;

            # Inject OpenRouter API key
            proxy_set_header Authorization "Bearer ${OPENROUTER_API_KEY}";

            # Enable upstream SSL server name verification
            proxy_ssl_server_name on;

            # Pass standard proxy headers
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass client certificate info to upstream
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;

            # Support streaming responses
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
            proxy_buffering off;
        }

        # Proxy all other requests to Ollama
        location / {
            proxy_pass http://host.docker.internal:11434;

            # Pass standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass client certificate info to upstream
            proxy_set_header X-SSL-Client-DN $ssl_client_s_dn;
            proxy_set_header X-SSL-Client-Verify $ssl_client_verify;

            # Support streaming responses (SSE for chat completions)
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
            proxy_buffering off;
        }
    }
}
